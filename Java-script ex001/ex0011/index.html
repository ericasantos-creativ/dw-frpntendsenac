<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #667eea;
            border-radius: 5px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #764ba2;
        }

        button {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        #resultado {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 5px;
            max-height: 400px;
            overflow-y: auto;
        }

        .tabuada-item {
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
            font-size: 18px;
            color: #333;
        }

        .tabuada-item:last-child {
            border-bottom: none;
        }

        .tabuada-item strong {
            color: #667eea;
        }

        .mensagem-erro {
            color: #e74c3c;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tabuada</h1>
        <p style="text-align: center; color: #666; font-size: 16px;">Escreva um número na caixa abaixo e te montarei a tabuada dele</p>
        
        <div class="input-group">
            <input 
                type="number" 
                id="numero" 
                placeholder="Digite um número (1-10)" 
                min="1" 
                max="10"
            >
            <button onclick="gerarTabuada()">Gerar</button>
        </div>

        <div id="resultado">
            <p style="text-align: center; color: #999;">Aguardando o número...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
