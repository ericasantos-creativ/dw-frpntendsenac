<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encontrar o Maior Número</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        #resultado {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-left: 4px solid #667eea;
            border-radius: 5px;
            color: #333;
            font-weight: bold;
            text-align: center;
            min-height: 30px;
            display: none;
        }

        #resultado.ativo {
            display: block;
        }

        .resultado-sucesso {
            background: #e8f5e9;
            border-left-color: #4caf50;
            color: #2e7d32;
        }

        .resultado-erro {
            background: #ffebee;
            border-left-color: #f44336;
            color: #c62828;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Encontrar o Maior Número</h1>

        <form onsubmit="encontrarMaior(event)">
            <div class="form-group">
                <label for="numero1">Digite o 1º número:</label>
                <input type="number" id="numero1" name="numero1" required>
            </div>

            <div class="form-group">
                <label for="numero2">Digite o 2º número:</label>
                <input type="number" id="numero2" name="numero2" required>
            </div>

            <div class="form-group">
                <label for="numero3">Digite o 3º número:</label>
                <input type="number" id="numero3" name="numero3" required>
            </div>

            <button type="submit">Verificar</button>
        </form>

        <div id="resultado"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
